<!DOCTYPE html>
<html dir="rtl" lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIRO - سایتی فیلم و سینەما</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            min-height: 100vh;
        }

        /* === هێدەری سەرەکی === */
        .navbar {
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(15px);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #222;
        }

        .logo {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(135deg, #e50914, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        .nav-links a {
            color: #ccc;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
            font-weight: 500;
        }

        .nav-links a:hover { color: #e50914; }

        .admin-btn {
            background: #e50914;
            color: white !important;
            padding: 8px 15px !important;
            border-radius: 20px;
            font-size: 13px !important;
        }

        .admin-btn:hover { background: #ff0f1f !important; color: white !important; }

        .search-box {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 25px;
            padding: 10px 20px;
            color: white;
            font-size: 14px;
            width: 150px;
            outline: none;
            transition: 0.3s;
        }

        .search-box:focus { border-color: #e50914; width: 200px; }

        /* === بەشی هێرۆ === */
        .hero {
            background: linear-gradient(135deg, #1a0a0a 0%, #0a0a0a 50%, #0a1a1a 100%);
            padding: 60px 20px;
            text-align: center;
            border-bottom: 2px solid #1a1a1a;
        }

        .hero h1 {
            font-size: 36px;
            background: linear-gradient(135deg, #fff, #e50914);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .hero p { color: #888; font-size: 16px; }

        /* === پۆلێنەکان === */
        .categories {
            display: flex;
            gap: 10px;
            padding: 20px 25px;
            overflow-x: auto;
            flex-wrap: wrap;
            justify-content: center;
        }

        .category {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 13px;
            color: #ccc;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }

        .category.active, .category:hover {
            background: #e50914;
            border-color: #e50914;
            color: white;
        }

        /* === کۆنتێنەری فیلمەکان === */
        .section-title {
            padding: 20px 25px 10px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: #e50914;
            border-radius: 2px;
        }

        .film-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            padding: 15px 25px;
        }

        .film-card {
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #1a1a1a;
            position: relative;
        }

        .film-card:hover {
            transform: translateY(-8px);
            border-color: #e50914;
            box-shadow: 0 15px 40px rgba(229,9,20,0.3);
        }

        .film-poster {
            width: 100%;
            aspect-ratio: 2/3;
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            position: relative;
        }

        .film-rating {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            color: #ffd700;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(229,9,20,0.9);
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            display: none;
            z-index: 10;
            line-height: 28px;
            text-align: center;
        }

        .admin-mode .delete-btn { display: block; }

        .film-info {
            padding: 12px;
        }

        .film-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
            line-height: 1.3;
        }

        .film-year {
            font-size: 11px;
            color: #888;
        }

        .film-subtitle-badge {
            display: inline-block;
            background: #e50914;
            color: white;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 12px;
            margin-top: 6px;
        }

        .play-btn {
            width: 100%;
            background: #e50914;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 8px;
            margin-top: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
        }

        .play-btn:hover { background: #ff0f1f; }

        /* === مۆدالی بینینی فیلم === */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 999;
            overflow-y: auto;
        }

        .modal-content {
            max-width: 700px;
            margin: 20px auto;
            background: #111;
            border-radius: 16px;
            padding: 25px;
            border: 1px solid #333;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 30px;
            color: white;
            cursor: pointer;
            z-index: 1000;
            background: none;
            border: none;
        }

        .modal-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #e50914;
        }

        .subtitle-box {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            border-right: 3px solid #e50914;
        }

        .subtitle-label { color: #aaa; font-size: 13px; margin-bottom: 5px; }
        .subtitle-text { color: #fff; font-size: 16px; line-height: 1.8; direction: rtl; }

        .watch-btn {
            width: 100%;
            background: linear-gradient(135deg, #e50914, #b20710);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 17px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
            font-family: inherit;
        }

        .watch-btn:hover { transform: scale(1.02); }

        /* === پانێڵی ئەدمین === */
        .admin-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 1001;
            overflow-y: auto;
        }

        .admin-content {
            max-width: 500px;
            margin: 30px auto;
            background: #111;
            border-radius: 16px;
            padding: 25px;
            border: 1px solid #e50914;
        }

        .admin-content h2 {
            color: #e50914;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .admin-content label {
            display: block;
            color: #ccc;
            margin: 12px 0 5px;
            font-size: 14px;
        }

        .admin-content input,
        .admin-content textarea,
        .admin-content select {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: 0.3s;
        }

        .admin-content input:focus,
        .admin-content textarea:focus,
        .admin-content select:focus {
            border-color: #e50914;
        }

        .admin-content textarea {
            min-height: 80px;
            resize: vertical;
        }

        .submit-btn {
            width: 100%;
            background: #e50914;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            font-family: inherit;
            font-weight: bold;
        }

        .submit-btn:hover { background: #ff0f1f; }

        .logout-btn {
            background: #333;
            width: 100%;
            margin-top: 10px;
        }

        .logout-btn:hover { background: #555; }

        .password-box {
            text-align: center;
            padding: 30px;
        }

        .password-box input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            text-align: center;
            outline: none;
            margin: 15px 0;
        }

        .password-box input:focus { border-color: #e50914; }

        .error-msg {
            color: #e50914;
            font-size: 13px;
            text-align: center;
            display: none;
        }

        /* === پەڕەپەڕ === */
        footer {
            background: #0a0a0a;
            border-top: 1px solid #1a1a1a;
            padding: 30px;
            text-align: center;
            color: #555;
            margin-top: 40px;
        }

        footer .logo {
            font-size: 24px;
            margin-bottom: 10px;
            display: inline-block;
        }

        /* === دیزاینی مۆبایل === */
        @media (min-width: 768px) {
            .film-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            }
        }

        @media (min-width: 1024px) {
            .film-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }

        /* === هۆشداری سەرکەوتن === */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2ecc71;
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 2000;
            display: none;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; bottom: 10px; }
            to { opacity: 1; bottom: 30px; }
        }
    </style>
</head>
<body>

    <!-- هۆشداری -->
    <div class="toast" id="toast">✅ بە سەرکەوتوویی زیاد کرا!</div>

    <!-- هێدەر -->
    <nav class="navbar">
        <div class="logo">MIRO</div>
        <ul class="nav-links">
            <li><a href="#" onclick="closeAdmin()">سەرەکی</a></li>
            <li><a href="#" class="admin-btn" onclick="openAdmin()">🔐 ئەدمین</a></li>
        </ul>
        <input type="text" class="search-box" placeholder="🔍 گەڕان..." onkeyup="searchFilm(this.value)">
    </nav>

    <!-- بەشی هێرۆ -->
    <div class="hero">
        <h1>🎬 MIRO - فیلم بە کوردی</h1>
        <p>فیلم و زنجیرەکان بە ژێرنووسی کوردی سۆرانی</p>
    </div>

    <!-- پۆلێنەکان -->
    <div class="categories" id="categoryList">
        <div class="category active" onclick="filterCategory('all')">🎬 هەموو</div>
    </div>

    <!-- فیلمەکان -->
    <div class="section-title">🔥 فیلمە بەناوبانگەکان</div>
    <div class="film-grid" id="filmGrid"></div>

    <!-- مۆدالی بینینی فیلم -->
    <div class="modal" id="filmModal">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div class="modal-content" id="modalContent"></div>
    </div>

    <!-- پانێڵی ئەدمین -->
    <div class="admin-panel" id="adminPanel">
        <div class="admin-content" id="adminContent">
            <!-- پاسۆرد یان فۆڕمی زیادکردن لێرە دەردەکەوێت -->
        </div>
    </div>

    <!-- پەڕەپەڕ -->
    <footer>
        <div class="logo">MIRO</div>
        <p>&copy; 2025 MIRO - هەموو مافێک پارێزراوە</p>
    </footer>

    <script>
        // ==================== ڕێکخستنەکان ====================
        const ADMIN_PASSWORD = "miro2025"; // 👈 پاسۆردەکەت لێرە بگۆڕە!
        let isAdmin = false;
        let currentFilter = 'all';

        // ==================== داتای فیلمەکان ====================
        let films = JSON.parse(localStorage.getItem('miroFilms')) || [
            {
                id: 1,
                title: "Inception (دەستپێک)",
                year: "2010",
                rating: "8.8",
                category: "action",
                poster: "🌀",
                subtitle: "ئێمە لە خەونێکی کەسێکی ترداین کە نازانین کێیە",
                duration: "2h 28m",
                description: "کۆب پیشەیەکی تایبەتی هەیە لە دزینی نهێنیەکان لە خەونەکاندا."
            },
            {
                id: 2,
                title: "The Dark Knight",
                year: "2008",
                rating: "9.0",
                category: "action",
                poster: "🦇",
                subtitle: "بۆچی ئەوەندە جدییت؟",
                duration: "2h 32m",
                description: "باتمان ڕووبەڕووی جۆکەر دەبێتەوە."
            },
            {
                id: 3,
                title: "Forrest Gump",
                year: "1994",
                rating: "8.8",
                category: "drama",
                poster: "🏃",
                subtitle: "ژیان وەک سندوقێکی چۆکلێت وایە",
                duration: "2h 22m",
                description: "فۆڕێست گەمپ ژیانێکی نائاسایی دەژی."
            }
        ];

        // ==================== نیشاندانی فیلمەکان ====================
        function displayFilms(filter = 'all', search = '') {
            const grid = document.getElementById('filmGrid');
            grid.innerHTML = '';
            currentFilter = filter;

            let filteredFilms = films;
            
            if (filter !== 'all') {
                filteredFilms = films.filter(f => f.category === filter);
            }
            
            if (search) {
                filteredFilms = filteredFilms.filter(f => 
                    f.title.toLowerCase().includes(search.toLowerCase())
                );
            }

            if (filteredFilms.length === 0) {
                grid.innerHTML = '<p style="text-align:center; color:#888; grid-column:1/-1; padding:40px;">هیچ فیلمێک نەدۆزرایەوە 🎬</p>';
                return;
            }

            filteredFilms.forEach(film => {
                const card = document.createElement('div');
                card.className = 'film-card';
                card.innerHTML = `
                    <div class="film-poster">
                        ${film.poster}
                        <div class="film-rating">⭐ ${film.rating}</div>
                        ${isAdmin ? `<button class="delete-btn" onclick="event.stopPropagation(); deleteFilm(${film.id})">×</button>` : ''}
                    </div>
                    <div class="film-info">
                        <div class="film-title">${film.title}</div>
                        <div class="film-year">${film.year} • ${film.duration}</div>
                        <div class="film-subtitle-badge">ژێرنووسی کوردی</div>
                        <button class="play-btn" onclick="event.stopPropagation(); openModal(film)">▶️ بینین</button>
                    </div>
                `;
                card.onclick = () => openModal(film);
                grid.appendChild(card);
            });

            updateCategories();
        }

        // ==================== پۆلێنەکان ====================
        function updateCategories() {
            const categoryList = document.getElementById('categoryList');
            const categories = ['all', ...new Set(films.map(f => f.category))];
            
            categoryList.innerHTML = categories.map(cat => {
                const name = cat === 'all' ? '🎬 هەموو' : 
                             cat === 'action' ? '💥 ئەکشن' :
                             cat === 'drama' ? '🎭 دراما' :
                             cat === 'kurdish' ? '☀️ کوردی' :
                             cat === 'animation' ? '🎨 ئەنیمەیشن' : cat;
                const active = currentFilter === cat ? ' active' : '';
                return `<div class="category${active}" onclick="filterCategory('${cat}')">${name}</div>`;
            }).join('');
        }

        function filterCategory(category) {
            displayFilms(category);
        }

        // ==================== مۆدالی فیلم ====================
        function openModal(film) {
            const modal = document.getElementById('filmModal');
            const content = document.getElementById('modalContent');
            
            content.innerHTML = `
                <div style="text-align:center; font-size:60px;">${film.poster}</div>
                <div class="modal-title">${film.title}</div>
                <p style="color:#888;">${film.year} • ${film.duration} • ⭐ ${film.rating}</p>
                <p style="color:#ccc; margin:15px 0; line-height:1.8;">${film.description}</p>
                
                <div class="subtitle-box">
                    <div class="subtitle-label">📝 ژێرنووسی کوردی سۆرانی:</div>
                    <div class="subtitle-text">${film.subtitle}</div>
                </div>
                
                <button class="watch-btn" onclick="window.open('https://www.youtube.com/watch?v=فیلمەکە', '_blank')">
                    ▶️ بینینی فیلم
                </button>
            `;
            
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('filmModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // ==================== گەڕان ====================
        function searchFilm(value) {
            displayFilms(currentFilter, value);
        }

        // ==================== پانێڵی ئەدمین ====================
        function openAdmin() {
            if (isAdmin) {
                showAdminForm();
            } else {
                showPasswordForm();
            }
            document.getElementById('adminPanel').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeAdmin() {
            document.getElementById('adminPanel').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function showPasswordForm() {
            const content = document.getElementById('adminContent');
            content.innerHTML = `
                <h2>🔐 چوونەژوورەوە</h2>
                <div class="password-box">
                    <p style="color:#ccc;">تکایە پاسۆردی ئەدمین بنووسە:</p>
                    <input type="password" id="adminPassword" placeholder="پاسۆرد">
                    <p class="error-msg" id="errorMsg">❌ پاسۆرد هەڵەیە!</p>
                    <button class="submit-btn" onclick="checkPassword()">چوونەژوورەوە</button>
                    <button class="submit-btn logout-btn" onclick="closeAdmin()">🔙 گەڕانەوە</button>
                </div>
            `;
        }

        function checkPassword() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                isAdmin = true;
                showAdminForm();
                displayFilms(currentFilter);
                document.body.classList.add('admin-mode');
                showToast('✅ بەخێربێیت ئەدمین!');
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }

        function showAdminForm() {
            const content = document.getElementById('adminContent');
            content.innerHTML = `
                <h2>➕ زیادکردنی فیلمی نوێ</h2>
                
                <label>🎬 ناوی فیلم:</label>
                <input type="text" id="filmTitle" placeholder="ناوی فیلم بنووسە...">
                
                <label>📅 ساڵ:</label>
                <input type="text" id="filmYear" placeholder="2025">
                
                <label>⭐ ڕێژە (Rating):</label>
                <input type="text" id="filmRating" placeholder="8.5">
                
                <label>⏱️ ماوە:</label>
                <input type="text" id="filmDuration" placeholder="2h 15m">
                
                <label>🎭 پۆلێن:</label>
                <select id="filmCategory">
                    <option value="action">ئەکشن</option>
                    <option value="drama">دراما</option>
                    <option value="kurdish">کوردی</option>
                    <option value="animation">ئەنیمەیشن</option>
                    <option value="horror">ترسناک</option>
                    <option value="comedy">کۆمیدی</option>
                </select>
                
                <label>🎨 ئیمۆجی (پۆستەر):</label>
                <input type="text" id="filmPoster" placeholder="🎬">
                
                <label>📝 ژێرنووسی کوردی:</label>
                <textarea id="filmSubtitle" placeholder="ژێرنووسی کوردی سۆرانی بنووسە..."></textarea>
                
                <label>📄 کورتەی فیلم:</label>
                <textarea id="filmDescription" placeholder="کورتەی فیلم بنووسە..."></textarea>
                
                <button class="submit-btn" onclick="addFilm()">✅ زیادکردنی فیلم</button>
                <button class="submit-btn logout-btn" onclick="logout()">🚪 چوونەدەرەوە</button>
                <button class="submit-btn logout-btn" onclick="closeAdmin()">🔙 گەڕانەوە</button>
            `;
        }

        function addFilm() {
            const newFilm = {
                id: Date.now(),
                title: document.getElementById('filmTitle').value || 'فیلمی نوێ',
                year: document.getElementById('filmYear').value || '2025',
                rating: document.getElementById('filmRating').value || '8.0',
                duration: document.getElementById('filmDuration').value || '2h 00m',
                category: document.getElementById('filmCategory').value,
                poster: document.getElementById('filmPoster').value || '🎬',
                subtitle: document.getElementById('filmSubtitle').value || 'ژێرنووسی کوردی',
                description: document.getElementById('filmDescription').value || 'کورتەی فیلم'
            };

            films.unshift(newFilm);
            localStorage.setItem('miroFilms', JSON.stringify(films));
            
            displayFilms(currentFilter);
            showToast('✅ فیلم بە سەرکەوتوویی زیاد کرا!');
            closeAdmin();
        }

        function deleteFilm(id) {
            if (confirm('ئایا دڵنیایت دەتەوێت ئەم فیلمە بسڕیتەوە؟')) {
                films = films.filter(f => f.id !== id);
                localStorage.setItem('miroFilms', JSON.stringify(films));
                displayFilms(currentFilter);
                showToast('🗑️ فیلم سڕایەوە');
            }
        }

        function logout() {
            isAdmin = false;
            document.body.classList.remove('admin-mode');
            displayFilms(currentFilter);
            closeAdmin();
            showToast('👋 چوونەدەرەوە');
        }

        // ==================== هۆشداری ====================
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2000);
        }

        // ==================== ئیڤێنتەکان ====================
        document.getElementById('filmModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.getElementById('adminPanel').addEventListener('click', function(e) {
            if (e.target === this) closeAdmin();
        });

        // ==================== دەستپێکردن ====================
        displayFilms();
    </script>

</body>
</html>
